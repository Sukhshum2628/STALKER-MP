<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="460" rx="14" fill="#ffffff" stroke="#d0d7de"/>
  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0d1117">STALKER-MP — Architecture &amp; Boundaries</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#57606a">Host-authoritative, deterministic multiplayer layered on the X-Ray engine</text>

  <!-- Engine -->
  <rect x="40" y="95" width="180" height="70" rx="10" fill="#eaeef2" stroke="#8c959f"/>
  <text x="130" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#0d1117">X-Ray Engine</text>
  <text x="130" y="148" text-anchor="middle" font-size="11" fill="#57606a">frame callback</text>

  <!-- Bridge -->
  <rect x="270" y="95" width="190" height="70" rx="10" fill="#ddf4ff" stroke="#54aeff"/>
  <text x="365" y="123" text-anchor="middle" font-size="13" font-weight="600" fill="#0d1117">EngineFrameBridge</text>
  <text x="365" y="145" text-anchor="middle" font-size="11" fill="#57606a">single seqFrame hook</text>

  <!-- Dispatcher -->
  <rect x="510" y="95" width="200" height="70" rx="10" fill="#ddf4ff" stroke="#54aeff"/>
  <text x="610" y="123" text-anchor="middle" font-size="13" font-weight="600" fill="#0d1117">FrameDispatcher</text>
  <text x="610" y="145" text-anchor="middle" font-size="11" fill="#57606a">deterministic ordering</text>

  <line x1="220" y1="130" x2="270" y2="130" stroke="#57606a" stroke-width="2" marker-end="url(#a)"/>
  <line x1="460" y1="130" x2="510" y2="130" stroke="#57606a" stroke-width="2" marker-end="url(#a)"/>

  <!-- Subsystems lane -->
  <rect x="40" y="205" width="880" height="120" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="56" y="228" font-size="12" font-weight="700" fill="#57606a">ENGINE-FREE SUBSYSTEMS (deterministic tick order)</text>
  <g font-size="11.5" font-weight="600" fill="#0d1117">
    <rect x="56"  y="245" width="120" height="58" rx="8" fill="#fff" stroke="#8c959f"/><text x="116" y="270" text-anchor="middle">World</text><text x="116" y="290" text-anchor="middle" fill="#57606a" font-weight="400">100</text>
    <rect x="188" y="245" width="120" height="58" rx="8" fill="#fff" stroke="#8c959f"/><text x="248" y="270" text-anchor="middle">EntityRegistry</text><text x="248" y="290" text-anchor="middle" fill="#57606a" font-weight="400">200</text>
    <rect x="320" y="245" width="120" height="58" rx="8" fill="#fff" stroke="#8c959f"/><text x="380" y="270" text-anchor="middle">Player</text><text x="380" y="290" text-anchor="middle" fill="#57606a" font-weight="400">250</text>
    <rect x="452" y="245" width="110" height="58" rx="8" fill="#fff" stroke="#8c959f"/><text x="507" y="270" text-anchor="middle">Bubble</text><text x="507" y="290" text-anchor="middle" fill="#57606a" font-weight="400">300</text>
    <rect x="574" y="245" width="110" height="58" rx="8" fill="#fff" stroke="#8c959f"/><text x="629" y="270" text-anchor="middle">Transition</text><text x="629" y="290" text-anchor="middle" fill="#57606a" font-weight="400">350</text>
    <rect x="696" y="245" width="110" height="58" rx="8" fill="#dafbe1" stroke="#4ac26b"/><text x="751" y="270" text-anchor="middle">Snapshot</text><text x="751" y="290" text-anchor="middle" fill="#57606a" font-weight="400">400</text>
    <rect x="818" y="245" width="86" height="58" rx="8" fill="#fff" stroke="#8c959f"/><text x="861" y="270" text-anchor="middle">Net</text><text x="861" y="290" text-anchor="middle" fill="#57606a" font-weight="400">900</text>
  </g>
  <line x1="610" y1="165" x2="610" y2="205" stroke="#57606a" stroke-width="2" marker-end="url(#a)"/>

  <!-- Boundary callouts -->
  <rect x="40" y="360" width="430" height="72" rx="10" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="255" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">One Engine Boundary</text>
  <text x="255" y="408" text-anchor="middle" font-size="11.5" fill="#57606a">engine headers ONLY in EngineAdapters.cpp</text>

  <rect x="490" y="360" width="430" height="72" rx="10" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="705" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#0d1117">One Platform Boundary</text>
  <text x="705" y="408" text-anchor="middle" font-size="11.5" fill="#57606a">OS socket headers ONLY in PlatformSockets.cpp</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#57606a"/></marker></defs>
</svg>
